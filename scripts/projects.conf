# Projects to clone/update alongside dotenv
# Format: repo_url  install_cmd (optional)
# install_cmd runs from the project directory after clone/pull

# Git identity switcher — installs to ~/.local/bin
git@github.com:Dxsk/git-identity-manager.git  install -m755 git-identity.sh ~/.local/bin/git-identity
git@github.com:Dxsk/mtd.git  uv pip install -e .
