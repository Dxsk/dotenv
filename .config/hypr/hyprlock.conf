background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(fd5622ee)
    inner_color = rgba(1a1a1aee)
    font_color = rgb(ffffff)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 10
    check_color = rgba(e53935ee)
    fail_color = rgba(ff0000ee)
    fail_text = <i>$FAIL</i>
    fail_timeout = 2000
    fail_transition = 300

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(ffffffee)
    font_size = 64
    font_family = Sans

    position = 0, 80
    halign = center
    valign = center
}
