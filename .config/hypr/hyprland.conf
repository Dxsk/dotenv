source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf

################
### MONITORS ###
################

# Fallback for hotplugged/unknown monitors only
monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = hyprlauncher


#################
### AUTOSTART ###
#################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = wl-paste --watch cliphist store
exec-once = caelestia shell
exec-once = hypridle
exec-once = protonmail-bridge &
exec-once = betterbird &
exec-once = rocketchat-desktop &


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,capitaine-cursors
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,capitaine-cursors
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GTK_THEME,adw-gtk3-dark


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    col.active_border = rgba(fd5622ee) rgba(e53935ee) 45deg
    col.inactive_border = rgba(393836aa)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant = intl

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace


####################
### KEYBINDINGS  ###
####################

$mainMod = ALT

# Core
bind = $mainMod, T, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, L, exec, loginctl lock-session
bind = $mainMod SHIFT, V, exec, caelestia clipboard
bind = $mainMod SHIFT, S, exec, grimblast copy area
bind = $mainMod, D, exec, QS_CONFIG_NAME=caelestia qs ipc call drawers toggle launcher
bind = $mainMod, F, fullscreen, 2

# Layout control (i3-like)
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, H, togglesplit,

# Tabbed/grouped windows (i3 tabbed mode)
bind = $mainMod, W, togglegroup,
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod SHIFT, TAB, changegroupactive, b

# Move focus (i3-like: arrows)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows (i3-like: shift+arrows)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize mode (i3-like: mod+R then arrows, escape to exit)
bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive, 30 0
binde = , left, resizeactive, -30 0
binde = , up, resizeactive, 0 -30
binde = , down, resizeactive, 0 30
binde = SHIFT, right, resizeactive, 100 0
binde = SHIFT, left, resizeactive, -100 0
binde = SHIFT, up, resizeactive, 0 -100
binde = SHIFT, down, resizeactive, 0 100
bind = , escape, submap, reset
bind = , Return, submap, reset
submap = reset

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move window to workspace (silent, like i3 --no-auto-back-and-forth)
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# Cycle workspaces
bind = $mainMod SHIFT, right, workspace, r+1
bind = $mainMod SHIFT, left, workspace, r-1

# Scratchpad (i3 scratchpad equivalent)
bind = $mainMod, S, togglespecialworkspace, magic

# Mouse binds
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Wallpaper
bind = $mainMod, B, exec, caelestia wallpaper -r ~/Pictures/wallpapers

# Screenshots (caelestia intégré)
bind = , Print, exec, caelestia screenshot -r -f
bind = $mainMod, Print, exec, caelestia screenshot
bind = SHIFT, Print, exec, grimblast copy output
bind = $mainMod, Print, exec, grimblast copy window

# Media keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fullscreen-clean
    match:fullscreen = true
    rounding = 0
    border_size = 0
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Group colors (tabbed windows)
group {
    col.border_active = rgba(fd5622ee)
    col.border_inactive = rgba(393836aa)

    groupbar {
        font_size = 10
        gradients = false
        col.active = rgba(fd5622ee)
        col.inactive = rgba(393836aa)
    }
}

##############################
### APP WORKSPACE RULES    ###
##############################

windowrule {
    name = spotify-to-ws10
    match:class = ^(Spotify|spotify)$
    workspace = 10 silent
}

windowrule {
    name = vesktop-to-ws9
    match:class = ^(vesktop)$
    workspace = 9 silent
}

windowrule {
    name = rocketchat-to-ws9
    match:class = ^(Rocket\.Chat|rocketchat)$
    workspace = 9 silent
}

windowrule {
    name = protonbridge-to-ws8
    match:class = ^(protonmail-bridge|proton-bridge)$
    workspace = 8 silent
}

windowrule {
    name = betterbird-to-ws6
    match:class = ^(eu\.betterbird\.Betterbird)$
    workspace = 6 silent
}
